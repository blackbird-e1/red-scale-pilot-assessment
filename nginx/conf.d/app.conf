# Bootstrap config — HTTP only, used during initial Let's Encrypt cert issuance.
#
# Workflow:
#   1. Deploy with this file in place (docker compose up -d)
#   2. Run certbot to obtain certs:
#        docker compose run --rm --entrypoint certbot certbot certonly --webroot \
#          --webroot-path /var/www/certbot \
#          --email you@example.com \
#          --agree-tos --no-eff-email \
#          -d f1-chat.tomshaw.trentvision.cloud
#   3. Swap in the SSL config:
#        cp nginx/conf.d/app.conf.ssl nginx/conf.d/app.conf
#   4. Reload nginx:
#        docker compose exec nginx nginx -s reload

server {
    listen 80;
    server_name f1-chat.tomshaw.trentvision.cloud;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
